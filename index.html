<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Drip — Live Sports Intelligence</title>
  <meta name="description"
    content="Editorial-grade live sports analytics, AI-powered predictions, and betting intelligence." />

  <!-- PWA -->
  <meta name="theme-color" content="#FAFAF8" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SportSync" />
  <link rel="shortcut icon" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
  <link rel="preload" as="fetch" href="/manifest.webmanifest" crossorigin="anonymous" />
  <link rel="preload" as="image" href="/icons/icon-192.png" />
  <link rel="preload" as="image" href="/icons/icon-512.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://a.espncdn.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #FAFAF8;
      color: #1A1A18;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0;
    }

    /* Pre-React fallback loading state */
    #root:empty::after {
      content: 'Loading…';
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 0.05em;
    }

    .live-pulse {
      animation: pulse-red 2.4s infinite;
    }

    @keyframes pulse-red {
      0% {
        box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7);
      }

      70% {
        box-shadow: 0 0 0 6px rgba(244, 63, 94, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(244, 63, 94, 0);
      }
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
