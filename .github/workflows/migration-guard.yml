name: migration-guard

on:
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "scripts/validate-migrations.mjs"
      - ".github/workflows/migration-guard.yml"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  validate-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate migration naming and version uniqueness
        run: npm run check:migrations
